<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Сброс пароля | Loregard</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/css/login.css">
</head>
<body>
<div class="bg-decoration">
    <div class="rune rune-1"></div>
    <div class="rune rune-2"></div>
    <div class="rune rune-3"></div>
    <div class="rune rune-4"></div>
    <div class="mist mist-1"></div>
    <div class="mist mist-2"></div>
</div>

<div class="login-page">
    <div class="login-container">
        <!-- Левая часть с порталом -->
        <div class="login-portal">
            <div class="portal-content">
                <div class="portal-circle"></div>
                <div class="portal-runes">
                    <span>ᚠ</span>
                    <span>ᚢ</span>
                    <span>ᚦ</span>
                    <span>ᚨ</span>
                    <span>ᚱ</span>
                </div>
                <h1 class="portal-title">Новое тайное слово</h1>
                <p class="portal-description">
                    Придумай новый пароль, чтобы продолжить приключение
                </p>
            </div>
        </div>

        <!-- Правая часть с формой сброса -->
        <div class="login-form-container">
            <div class="login-form-wrapper">
                <h2 class="form-title">Сброс <span class="gradient-text">пароля</span></h2>

                <div class="error-message" th:if="${error}" th:remove="tag">
                    <div class="alert alert-error">
                        <span class="alert-icon">⚠️</span>
                        <span th:text="${error}">Ссылка устарела</span>
                    </div>
                </div>

                <form method="post" th:action="@{/reset-password}" class="login-form">
                    <input type="hidden" name="token" th:value="${token}">

                    <div class="form-group">
                        <label for="password" class="form-label">
                            <span class="label-icon">🔒</span>
                            Новое тайное слово
                        </label>
                        <input type="password"
                               id="password"
                               name="password"
                               class="form-input"
                               placeholder="Придумайте новый пароль"
                               minlength="6"
                               required>
                        <small class="form-hint">Минимум 6 символов</small>
                    </div>

                    <div class="form-group">
                        <label for="confirmPassword" class="form-label">
                            <span class="label-icon">🔐</span>
                            Подтверждение
                        </label>
                        <input type="password"
                               id="confirmPassword"
                               name="confirmPassword"
                               class="form-input"
                               placeholder="Повторите пароль"
                               required>
                    </div>

                    <button type="submit" class="btn btn-primary btn-login">
                        <span>Сохранить</span>
                        <span class="btn-icon">✓</span>
                    </button>
                </form>

                <div class="login-divider">
                    <span class="divider-text">или</span>
                </div>

                <div class="register-section">
                    <a href="/login" class="btn btn-outline btn-register">
                        <span>Вернуться ко входу</span>
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    document.addEventListener('DOMContentLoaded', function() {
        document.querySelector('.login-container').classList.add('loaded');
    });
</script>
</body>
</html>
